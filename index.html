  var tsEl=document.getElementById('ts'+num),urEl=document.getElementById('ur'+num);
  if(outcome==='delivered'){
    card.classList.add('s-delivered');document.getElementById('obtn-d-'+num).classList.add('active');
    tsEl.textContent='✅ Delivered at '+ts;tsEl.className='ts-line show ts-d';
    urEl.classList.remove('show');setTimeout(function(){card.classList.add('collapsed');},600);
  }else if(outcome==='lop'){
    card.classList.add('s-lop');document.getElementById('obtn-l-'+num).classList.add('active');
    tsEl.textContent='🚪 Left on Porch at '+ts;tsEl.className='ts-line show ts-l';
    urEl.classList.remove('show');setTimeout(function(){card.classList.add('collapsed');},600);
  }else if(outcome==='undeliv'){
    card.classList.add('s-undeliv');document.getElementById('obtn-u-'+num).classList.add('active');
    tsEl.textContent='❌ Undeliverable — logged at '+ts;tsEl.className='ts-line show ts-u';
    urEl.classList.add('show');
  }
  updateOtag(num);updateProgress();
}
function updateOtag(num){
  var el=document.getElementById('otag'+num),s=state[num];
  if(s.outcome==='delivered'){el.textContent='✅ DELIVERED';el.className='otag otag-delivered';}
  else if(s.outcome==='lop'){el.textContent='🚪 LOP';el.className='otag otag-lop';}
  else if(s.outcome==='undeliv'){el.textContent='❌ UNDELIV';el.className='otag otag-undeliv';}
  else if(s.texted){el.textContent='🟡 TEXTED';el.className='otag otag-texted';}
  else{el.textContent='';el.className='otag';}
}
function toggleCard(num){document.getElementById('c'+num).classList.toggle('collapsed');}
function expandAll(){stops.forEach(function(s){document.getElementById('c'+s.num).classList.remove('collapsed');});}
function collapseAll(){stops.forEach(function(s){document.getElementById('c'+s.num).classList.add('collapsed');});}
function hideDone(){stops.forEach(function(s){var c=document.getElementById('c'+s.num);if(state[s.num].outcome)c.classList.add('collapsed');else c.classList.remove('collapsed');});}
function saveNotes(num){state[num].notes=document.getElementById('notes'+num).value;}
function saveReason(num){state[num].reason=document.getElementById('ur'+num).value;}
function refreshSummary(){
  var groups={delivered:[],lop:[],undeliv:[],pending:[]};
  stops.forEach(function(s){var b=state[s.num].outcome||'pending';groups[b].push({s:s,st:state[s.num]});});
  var total=stops.length,done=total-groups.pending.length;
  document.getElementById('sum-meta').textContent=done+' of '+total+' complete · '+groups.delivered.length+' delivered · '+groups.lop.length+' LOP · '+groups.undeliv.length+' undeliverable · '+groups.pending.length+' pending';
  var html='';
  [{key:'delivered',label:'✅ DELIVERED',cls:'sg-delivered',tagCls:'st-d',tagTxt:'DELIVERED'},
   {key:'lop',label:'🚪 LEFT ON PORCH',cls:'sg-lop',tagCls:'st-l',tagTxt:'LOP'},
   {key:'undeliv',label:'❌ UNDELIVERABLE',cls:'sg-undeliv',tagCls:'st-u',tagTxt:'UNDELIV'},
   {key:'pending',label:'⏳ PENDING',cls:'sg-pending',tagCls:'st-p',tagTxt:'PENDING'}
  ].forEach(function(sec){
    if(!groups[sec.key].length)return;
    html+='<div class="sum-group-title '+sec.cls+'">'+sec.label+' ('+groups[sec.key].length+')</div>';
    groups[sec.key].forEach(function(item){
      html+='<div class="sum-row"><div class="sum-num">'+item.s.num+'</div><div class="sum-info"><div class="sum-name">'+item.s.name+'</div>'+(item.st.ts?'<div class="sum-time">'+item.st.ts+'</div>':'')+(item.st.notes?'<div class="sum-note">Note: '+item.st.notes+'</div>':'')+(item.st.reason?'<div class="sum-note">Reason: '+item.st.reason+'</div>':'')+'</div><span class="sum-tag '+sec.tagCls+'">'+sec.tagTxt+'</span></div>';
    });
  });
  document.getElementById('sum-body').innerHTML=html;
  document.getElementById('summary-section').scrollIntoView({behavior:'smooth'});
}
function buildCards(){
  var wrap=document.getElementById('stops-wrap');
  stops.forEach(function(stop){
    var badgesHtml='';
    stop.badges.forEach(function(b){var bd=badgeDefs[b];badgesHtml+='<span class="badge '+bd.cls+'">'+bd.label+'</span>';});
    var specialHtml=stop.special?'<div class="special-note">'+stop.special+'</div>':'';
    var flexHtml=stop.flex_note?'<div class="flex-note">'+stop.flex_note+'</div>':'';
    var preNoteHtml=stop.notes_pre?'<div class="info-note">ℹ️ '+stop.notes_pre+'</div>':'';
    var card=document.createElement('div');
    card.className='card collapsed';card.id='c'+stop.num;
    card.innerHTML=
      '<div class="card-head" onclick="toggleCard('+stop.num+')">'+
        '<div class="stop-num">'+stop.num+'</div>'+
        '<div class="stop-info">'+
          '<div class="stop-name">'+stop.name+'</div>'+
          '<div class="stop-sub">'+stop.type+' · '+stop.order.split('·')[2].trim()+'</div>'+
        '</div>'+
        '<span class="otag" id="otag'+stop.num+'"></span>'+
        '<div class="chev">▼</div>'+
      '</div>'+
      '<div class="card-body">'+
        (badgesHtml?'<div class="badges">'+badgesHtml+'</div>':'')+
        specialHtml+flexHtml+preNoteHtml+
        '<div class="addr">'+stop.addr+'</div>'+
        '<div class="order-line">'+stop.order+'</div>'+
        '<div class="product-box">'+stop.product+'</div>'+
        '<div class="action-btns">'+
          '<a class="abtn abtn-nav" href="'+navUrl(stop.addr)+'" target="_blank">📍 NAVIGATE</a>'+
          '<a class="abtn abtn-text" href="sms:+1'+stop.phone+'">💬 TEXT</a>'+
          '<a class="abtn abtn-call" href="tel:+1'+stop.phone+'">📞 CALL</a>'+
        '</div>'+
        '<div class="status-row">'+
          '<button class="sbtn sbtn-y" id="tbtn'+stop.num+'" onclick="setTexted('+stop.num+')">🟡 MARK TEXTED</button>'+
        '</div>'+
        '<div class="outcome-label">DELIVERY OUTCOME</div>'+
        '<div class="outcome-row">'+
          '<button class="obtn obtn-d" id="obtn-d-'+stop.num+'" onclick="setOutcome('+stop.num+',\'delivered\')">✅ DELIVERED</button>'+
          '<button class="obtn obtn-l" id="obtn-l-'+stop.num+'" onclick="setOutcome('+stop.num+',\'lop\')">🚪 LEFT ON PORCH</button>'+
          '<button class="obtn obtn-u" id="obtn-u-'+stop.num+'" onclick="setOutcome('+stop.num+',\'undeliv\')">❌ UNDELIVERABLE</button>'+
        '</div>'+
        '<div class="ts-line" id="ts'+stop.num+'"></div>'+
        '<div class="notes-label">NOTES / GATE CODE / RESPONSE</div>'+
        '<textarea class="notes-in" id="notes'+stop.num+'" rows="2" placeholder="Gate code, unit #, directions..." oninput="saveNotes('+stop.num+')"></textarea>'+
        '<textarea class="undeliv-in" id="ur'+stop.num+'" rows="2" placeholder="Reason undeliverable..." oninput="saveReason('+stop.num+')"></textarea>'+
      '</div>';
    wrap.appendChild(card);
  });
}
buildCards();updateProgress();
</script>
</body>
</html>
