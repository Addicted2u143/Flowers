<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌸 Nicole's Delivery Run 2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --red: #c0392b; --yellow: #d4860a; --green: #1e8449; --blue: #1a5276;
  --red-bg: #fdf0ef; --yellow-bg: #fef9f0; --green-bg: #edfaf1; --blue-bg: #eaf4fb;
  --text: #1a1a1a; --sub: #666;
}
body { font-family: -apple-system,'Helvetica Neue',sans-serif; background:#eee9e3; padding-bottom:60px; }
header { background:#1a1a2e; color:white; padding:14px 12px 0; position:sticky; top:0; z-index:200; box-shadow:0 3px 14px rgba(0,0,0,.4); }
header h1 { font-size:1rem; font-weight:700; letter-spacing:.08em; text-align:center; }
.run-meta { font-size:.68rem; opacity:.6; text-align:center; margin-top:2px; font-family:monospace; }
.counter { text-align:center; font-size:.7rem; color:rgba(255,255,255,.65); font-family:monospace; margin:5px 0 7px; }
.controls { display:flex; gap:5px; padding:7px 0 10px; }
.ctrl-btn { flex:1; padding:8px 2px; border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.07); color:white; border-radius:7px; font-size:.6rem; font-weight:600; cursor:pointer; letter-spacing:.03em; }
.ctrl-btn:active { background:rgba(255,255,255,.2); }
.ctrl-btn.green { background:rgba(39,174,96,.25); border-color:#27ae60; }
.progress-bar { height:4px; background:rgba(255,255,255,.15); }
.progress-fill { height:100%; background:linear-gradient(90deg,#27ae60,#58d68d); transition:width .4s; width:0%; }
.stops-wrap { padding:10px 10px 0; display:flex; flex-direction:column; gap:10px; }
.card { border-radius:13px; border:2px solid #d5cfc8; background:white; overflow:hidden; box-shadow:0 1px 5px rgba(0,0,0,.08); transition:border-color .25s,background .25s; }
.card.s-yellow  { border-color:var(--yellow); background:var(--yellow-bg); }
.card.s-delivered { border-color:var(--green); background:var(--green-bg); }
.card.s-lop     { border-color:var(--blue);  background:var(--blue-bg); }
.card.s-undeliv { border-color:var(--red);   background:var(--red-bg); }
.card-head { display:flex; align-items:center; padding:11px 12px; gap:9px; cursor:pointer; user-select:none; }
.stop-num { font-size:1rem; font-weight:800; color:#999; min-width:22px; font-family:monospace; }
.stop-info { flex:1; min-width:0; }
.stop-name { font-size:.9rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stop-sub  { font-size:.62rem; color:var(--sub); font-family:monospace; margin-top:1px; }
.otag { font-size:.6rem; font-weight:700; padding:3px 7px; border-radius:20px; color:white; white-space:nowrap; flex-shrink:0; }
.otag-delivered { background:var(--green); }
.otag-lop       { background:var(--blue); }
.otag-undeliv   { background:var(--red); }
.otag-texted    { background:var(--yellow); }
.chev { font-size:.75rem; color:#bbb; transition:transform .25s; flex-shrink:0; }
.card.collapsed .chev { transform:rotate(-90deg); }
.card-body { padding:0 12px 13px; border-top:1px solid rgba(0,0,0,.06); }
.card.collapsed .card-body { display:none; }
.addr { font-size:.8rem; color:var(--sub); font-family:monospace; line-height:1.55; margin:9px 0 6px; white-space:pre-line; }
.order-line { font-size:.7rem; font-family:monospace; color:#888; margin-bottom:10px; }
.badges { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.badge { font-size:.62rem; font-weight:700; padding:3px 9px; border-radius:20px; color:white; }
.b-apt  { background:#7d3c98; }
.b-biz  { background:#1a5276; }
.b-time { background:#c0392b; }
.b-card { background:#1a5276; }
.b-novase { background:#6d4c41; }
.b-dd   { background:#2e7d32; }
.special-note { font-size:.75rem; font-weight:700; color:#c0392b; background:#fdf0ef; border-left:3px solid #c0392b; padding:6px 10px; border-radius:0 7px 7px 0; margin-bottom:10px; }
.info-note { font-size:.75rem; font-weight:700; color:#1a5276; background:#eaf4fb; border-left:3px solid #1a5276; padding:6px 10px; border-radius:0 7px 7px 0; margin-bottom:10px; }
.product-box { font-size:.75rem; background:#f8f8f8; border:1px solid #e0e0e0; border-radius:8px; padding:8px 10px; margin-bottom:10px; line-height:1.6; font-family:monospace; color:#444; }
.action-btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
.abtn { display:block; padding:12px 4px; border-radius:9px; text-align:center; text-decoration:none; font-size:.7rem; font-weight:700; letter-spacing:.04em; border:none; cursor:pointer; transition:opacity .15s,transform .1s; }
.abtn:active { opacity:.75; transform:scale(.97); }
.abtn-nav  { background:#1a1a2e; color:white; }
.abtn-text { background:#1e8449; color:white; }
.abtn-call { background:#1a5276; color:white; }
.status-row { display:flex; gap:6px; margin-bottom:10px; }
.sbtn { flex:1; padding:8px 3px; border-radius:8px; border:2px solid transparent; font-size:.62rem; font-weight:700; cursor:pointer; transition:all .18s; letter-spacing:.03em; text-align:center; }
.sbtn-y { background:#fef3e2; color:var(--yellow); border-color:var(--yellow); }
.sbtn-y.active { background:var(--yellow); color:white; }
.outcome-label { font-size:.65rem; font-weight:700; color:var(--sub); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; font-family:monospace; }
.outcome-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
.obtn { padding:11px 4px; border-radius:9px; border:2px solid transparent; font-size:.65rem; font-weight:700; cursor:pointer; text-align:center; transition:all .18s; line-height:1.3; }
.obtn:active { transform:scale(.96); }
.obtn-d { background:#eafaf1; color:var(--green); border-color:var(--green); }
.obtn-d.active { background:var(--green); color:white; }
.obtn-l { background:#eaf4fb; color:var(--blue); border-color:var(--blue); }
.obtn-l.active { background:var(--blue); color:white; }
.obtn-u { background:#fdf0ef; color:var(--red); border-color:var(--red); }
.obtn-u.active { background:var(--red); color:white; }
.ts-line { font-size:.68rem; font-family:monospace; font-weight:700; margin-bottom:8px; display:none; }
.ts-line.show { display:block; }
.ts-d { color:var(--green); } .ts-l { color:var(--blue); } .ts-u { color:var(--red); }
.notes-label { font-size:.65rem; font-weight:700; color:var(--sub); letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px; font-family:monospace; }
.notes-in { width:100%; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:.82rem; background:rgba(255,255,255,.85); color:var(--text); resize:none; font-family:monospace; line-height:1.45; margin-bottom:7px; }
.notes-in:focus { outline:none; border-color:#aaa; background:white; }
.undeliv-in { display:none; width:100%; padding:8px 10px; border:1px solid var(--red); border-radius:8px; font-size:.82rem; background:#fff8f8; color:var(--text); resize:none; font-family:monospace; line-height:1.45; }
.undeliv-in.show { display:block; }
.summary-section { margin:16px 10px 0; border-radius:13px; overflow:hidden; border:2px solid #1a1a2e; background:white; box-shadow:0 2px 10px rgba(0,0,0,.1); }
.summary-head { background:#1a1a2e; color:white; padding:13px 14px; text-align:center; }
.summary-head h2 { font-size:.9rem; letter-spacing:.08em; }
.summary-head p  { font-size:.68rem; opacity:.6; margin-top:3px; font-family:monospace; }
.sum-group-title { font-size:.65rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:white; padding:6px 14px; font-family:monospace; }
.sg-delivered { background:var(--green); } .sg-lop { background:var(--blue); } .sg-undeliv { background:var(--red); } .sg-pending { background:#888; }
.sum-row { display:flex; align-items:flex-start; padding:10px 14px; border-bottom:1px solid #f0f0f0; gap:10px; }
.sum-row:last-child { border-bottom:none; }
.sum-num { font-size:.78rem; font-weight:800; color:#aaa; min-width:20px; font-family:monospace; padding-top:1px; }
.sum-info { flex:1; }
.sum-name { font-size:.82rem; font-weight:700; color:var(--text); }
.sum-time { font-size:.68rem; font-family:monospace; color:var(--sub); margin-top:2px; }
.sum-note { font-size:.68rem; font-family:monospace; color:#888; margin-top:2px; font-style:italic; }
.sum-tag { font-size:.6rem; font-weight:700; padding:3px 8px; border-radius:20px; color:white; white-space:nowrap; flex-shrink:0; }
.st-d { background:var(--green); } .st-l { background:var(--blue); } .st-u { background:var(--red); } .st-p { background:#aaa; }
.refresh-btn { display:block; width:calc(100% - 24px); margin:12px auto; padding:12px; background:#1a1a2e; color:white; border:none; border-radius:10px; font-size:.8rem; font-weight:700; cursor:pointer; letter-spacing:.05em; text-align:center; }
.refresh-btn:active { opacity:.8; }
</style>
</head>
<body>
<header>
  <h1>🌸 NICOLE'S DELIVERY RUN 2</h1>
  <div class="run-meta">THURSDAY, MAY 7, 2026 · TRIP 5962331 · 10 STOPS · PHOENIX / LAVEEN, AZ</div>
  <div class="counter" id="counter">0 of 10 complete</div>
  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">EXPAND ALL</button>
    <button class="ctrl-btn" onclick="collapseAll()">COLLAPSE ALL</button>
    <button class="ctrl-btn" onclick="hideDone()">HIDE DONE</button>
    <button class="ctrl-btn green" onclick="refreshSummary()">SUMMARY ↓</button>

  <button class="refresh-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:#27ae60;">↑ BACK TO TOP</button>
</div>

<script>

  },
  {

  },
  {

  },
  {

    addr:"4239 N 67th Ln\nPhoenix, AZ 85033",
    phone:"6236945152", type:"Residential",
    order:"BMT #43280435 · Order #46705354 · Zone 3B-DD",
    product:"Daydream Bouquet-MD: LavGlsVse, RoseP...\nCard Isle Personalized Sku",
    badges:["card","dd"], special:null, notes_pre:"CARD ISLE ID: MH3BY"
  },
  {
    num:10, name:"ANITA WILLIAMS",
    addr:"5332 W Vernon Ave\nPhoenix, AZ 85035",
    phone:"6023806440", type:"Residential",
    order:"BMT #43467253 · Order #46741569 · Zone 3B",
    product:"Honey Bee Buzz for Spring-LG: BeeVse,...",
    badges:[], special:null, notes_pre:null
  }
];

var badgeDefs = {
  apt:    { cls:"b-apt",   label:"🏠 APARTMENT" },
  biz:    { cls:"b-biz",   label:"🏢 BUSINESS" },
  time:   { cls:"b-time",  label:"⏰ BEFORE 5 PM" },
  card:   { cls:"b-card",  label:"💌 CARD ISLE" },
  novase: { cls:"b-novase",label:"🚫 NO VASE" },
  dd:     { cls:"b-dd",    label:"📍 ZONE DD" }
};

var state = {};
stops.forEach(function(s){ state[s.num]={texted:false,outcome:null,ts:null,notes:'',reason:''}; });

function phxTime() {
  return new Date().toLocaleTimeString('en-US',{timeZone:'America/Phoenix',hour:'numeric',minute:'2-digit',hour12:true});
}
function navUrl(addr) { return 'https://maps.apple.com/?q='+encodeURIComponent(addr.replace(/\n/g,', ')); }
function updateProgress() {
  var done=0; stops.forEach(function(s){if(state[s.num].outcome)done++;});
  document.getElementById('prog').style.width=((done/stops.length)*100)+'%';
  document.getElementById('counter').textContent=done+' of '+stops.length+' complete';
}
function setTexted(num) {
  state[num].texted=true;
  document.getElementById('c'+num).classList.add('s-yellow');
  var btn=document.getElementById('tbtn'+num);
  btn.classList.add('active'); btn.textContent='🟡 TEXTED ✓';
  updateOtag(num);
}
function setOutcome(num,outcome) {
  var card=document.getElementById('c'+num);
  var ts=phxTime();
  state[num].outcome=outcome; state[num].ts=ts;
  card.classList.remove('s-yellow','s-delivered','s-lop','s-undeliv');
  ['d','l','u'].forEach(function(x){var b=document.getElementById('obtn-'+x+'-'+num);if(b)b.classList.remove('active');});
  var tsEl=document.getElementById('ts'+num);
  var urEl=document.getElementById('ur'+num);
  if(outcome==='delivered'){
    card.classList.add('s-delivered'); document.getElementById('obtn-d-'+num).classList.add('active');
    tsEl.textContent='✅ Delivered at '+ts; tsEl.className='ts-line show ts-d';
    urEl.classList.remove('show'); setTimeout(function(){card.classList.add('collapsed');},600);
  } else if(outcome==='lop'){
    card.classList.add('s-lop'); document.getElementById('obtn-l-'+num).classList.add('active');
    tsEl.textContent='🚪 Left on Porch at '+ts; tsEl.className='ts-line show ts-l';
    urEl.classList.remove('show'); setTimeout(function(){card.classList.add('collapsed');},600);
  } else if(outcome==='undeliv'){
    card.classList.add('s-undeliv'); document.getElementById('obtn-u-'+num).classList.add('active');
    tsEl.textContent='❌ Undeliverable — logged at '+ts; tsEl.className='ts-line show ts-u';
    urEl.classList.add('show');
  }
  updateOtag(num); updateProgress();
}
function updateOtag(num) {
  var el=document.getElementById('otag'+num); var s=state[num];
  if(s.outcome==='delivered'){el.textContent='✅ DELIVERED';el.className='otag otag-delivered';}
  else if(s.outcome==='lop'){el.textContent='🚪 LOP';el.className='otag otag-lop';}
  else if(s.outcome==='undeliv'){el.textContent='❌ UNDELIV';el.className='otag otag-undeliv';}
  else if(s.texted){el.textContent='🟡 TEXTED';el.className='otag otag-texted';}
  else{el.textContent='';el.className='otag';}
}
function toggleCard(num){document.getElementById('c'+num).classList.toggle('collapsed');}
function expandAll(){stops.forEach(function(s){document.getElementById('c'+s.num).classList.remove('collapsed');});}
function collapseAll(){stops.forEach(function(s){document.getElementById('c'+s.num).classList.add('collapsed');});}
function hideDone(){stops.forEach(function(s){var card=document.getElementById('c'+s.num);if(state[s.num].outcome)card.classList.add('collapsed');else card.classList.remove('collapsed');});}
function saveNotes(num){state[num].notes=document.getElementById('notes'+num).value;}
function saveReason(num){state[num].reason=document.getElementById('ur'+num).value;}

function refreshSummary() {
  var groups={delivered:[],lop:[],undeliv:[],pending:[]};
  stops.forEach(function(s){var bucket=state[s.num].outcome||'pending';groups[bucket].push({s:s,st:state[s.num]});});
  var total=stops.length,done=total-groups.pending.length;
  document.getElementById('sum-meta').textContent=done+' of '+total+' complete  ·  '+groups.delivered.length+' delivered  ·  '+groups.lop.length+' LOP  ·  '+groups.undeliv.length+' undeliverable  ·  '+groups.pending.length+' pending';
  var html='';
  var sections=[
    {key:'delivered',label:'✅ DELIVERED',cls:'sg-delivered',tagCls:'st-d',tagTxt:'DELIVERED'},
    {key:'lop',label:'🚪 LEFT ON PORCH',cls:'sg-lop',tagCls:'st-l',tagTxt:'LOP'},
    {key:'undeliv',label:'❌ UNDELIVERABLE',cls:'sg-undeliv',tagCls:'st-u',tagTxt:'UNDELIV'},
    {key:'pending',label:'⏳ PENDING',cls:'sg-pending',tagCls:'st-p',tagTxt:'PENDING'}
  ];
  sections.forEach(function(sec){
    if(!groups[sec.key].length)return;
    html+='<div class="sum-group-title '+sec.cls+'">'+sec.label+' ('+groups[sec.key].length+')</div>';
    groups[sec.key].forEach(function(item){
      html+='<div class="sum-row"><div class="sum-num">'+item.s.num+'</div><div class="sum-info"><div class="sum-name">'+item.s.name+'</div>'+(item.st.ts?'<div class="sum-time">'+item.st.ts+'</div>':'')+(item.st.notes?'<div class="sum-note">Note: '+item.st.notes+'</div>':'')+(item.st.reason?'<div class="sum-note">Reason: '+item.st.reason+'</div>':'')+'</div><span class="sum-tag '+sec.tagCls+'">'+sec.tagTxt+'</span></div>';
    });
  });
  document.getElementById('sum-body').innerHTML=html;
  document.getElementById('summary-section').scrollIntoView({behavior:'smooth'});
}

function buildCards() {
  var wrap=document.getElementById('stops-wrap');
  stops.forEach(function(stop){
    var badgesHtml='';
    stop.badges.forEach(function(b){var bd=badgeDefs[b];badgesHtml+='<span class="badge '+bd.cls+'">'+bd.label+'</span>';});
    var specialHtml=stop.special?'<div class="special-note">'+stop.special+'</div>':'';
    var preNoteHtml=stop.notes_pre?'<div class="info-note">ℹ️ '+stop.notes_pre+'</div>':'';
    var card=document.createElement('div');
    card.className='card collapsed'; card.id='c'+stop.num;
    card.innerHTML=
      '<div class="card-head" onclick="toggleCard('+stop.num+')">'+
        '<div class="stop-num">'+stop.num+'</div>'+
        '<div class="stop-info">'+
          '<div class="stop-name">'+stop.name+'</div>'+
          '<div class="stop-sub">'+stop.type+' · '+stop.order.split('·')[2].trim()+'</div>'+
        '</div>'+
        '<span class="otag" id="otag'+stop.num+'"></span>'+
        '<div class="chev">▼</div>'+
      '</div>'+
      '<div class="card-body">'+
        (badgesHtml?'<div class="badges">'+badgesHtml+'</div>':'')+
        specialHtml+preNoteHtml+
        '<div class="addr">'+stop.addr+'</div>'+
        '<div class="order-line">'+stop.order+'</div>'+
        '<div class="product-box">'+stop.product+'</div>'+
        '<div class="action-btns">'+
          '<a class="abtn abtn-nav" href="'+navUrl(stop.addr)+'" target="_blank">📍 NAVIGATE</a>'+
          '<a class="abtn abtn-text" href="sms:+1'+stop.phone+'">💬 TEXT</a>'+
          '<a class="abtn abtn-call" href="tel:+1'+stop.phone+'">📞 CALL</a>'+
        '</div>'+
        '<div class="status-row">'+
          '<button class="sbtn sbtn-y" id="tbtn'+stop.num+'" onclick="setTexted('+stop.num+')">🟡 MARK TEXTED</button>'+
        '</div>'+
        '<div class="outcome-label">DELIVERY OUTCOME</div>'+
        '<div class="outcome-row">'+
          '<button class="obtn obtn-d" id="obtn-d-'+stop.num+'" onclick="setOutcome('+stop.num+',\'delivered\')">✅ DELIVERED</button>'+
          '<button class="obtn obtn-l" id="obtn-l-'+stop.num+'" onclick="setOutcome('+stop.num+',\'lop\')">🚪 LEFT ON PORCH</button>'+
          '<button class="obtn obtn-u" id="obtn-u-'+stop.num+'" onclick="setOutcome('+stop.num+',\'undeliv\')">❌ UNDELIVERABLE</button>'+
        '</div>'+
        '<div class="ts-line" id="ts'+stop.num+'"></div>'+
        '<div class="notes-label">NOTES / GATE CODE / RESPONSE</div>'+
        '<textarea class="notes-in" id="notes'+stop.num+'" rows="2" placeholder="Gate code, unit #, directions..." oninput="saveNotes('+stop.num+')"></textarea>'+
        '<textarea class="undeliv-in" id="ur'+stop.num+'" rows="2" placeholder="Reason undeliverable..." oninput="saveReason('+stop.num+')"></textarea>'+
      '</div>';
    wrap.appendChild(card);
  });
}

buildCards();
updateProgress();
</script>
</body>
</html>
